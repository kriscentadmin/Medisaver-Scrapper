services:
  - type: web
    name: med-search-backend
    env: python
    plan: starter
    buildCommand: pip install -r api/requirements.txt && python -m prisma db push --schema prisma/schema.prisma && python -m prisma generate && python -m playwright install --with-deps chromium
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
