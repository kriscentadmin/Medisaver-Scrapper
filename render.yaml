services:
  - type: web
    name: med-search-backend
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt && python -m prisma py fetch && python -m prisma generate --schema prisma/schema.prisma && python -m playwright install --with-deps chromium
    preDeployCommand: python -m prisma db push --schema prisma/schema.prisma
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: PRISMA_BINARY_CACHE_DIR
        value: /opt/render/project/prisma/binaries
